# Student 3: Shadow Traffic — NGINX ConfigMap
# Stores the NGINX configuration for mirroring traffic from Blue (v1) to Green (v2).
# User traffic goes to Blue; a silent copy is sent to Green for testing.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-shadow-config
  namespace: progressive-django
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    http {
        upstream blue {
            server django-blue.progressive-django.svc.cluster.local:8000;
        }

        upstream green {
            server django-green.progressive-django.svc.cluster.local:8000;
        }

        server {
            listen 80;

            location / {
                # User sees only Blue (v1) response
                proxy_pass http://blue;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

                # Mirror traffic to Green (v2) — user does NOT see this response
                mirror /mirror-to-shadow;
                mirror_request_body on;
            }

            location = /mirror-to-shadow {
                internal;
                proxy_pass http://green$request_uri;
                proxy_set_header Host $host;
                proxy_set_header X-Shadow-Traffic "true";
                proxy_set_header X-Real-IP $remote_addr;
            }
        }
    }
