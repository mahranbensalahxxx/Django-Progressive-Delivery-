# Service to expose Blue (v1) pods individually for NGINX shadow routing
apiVersion: v1
kind: Service
metadata:
  name: django-blue
  namespace: progressive-django
  labels:
    app: django
    version: blue
spec:
  selector:
    app: django
    version: blue
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP
