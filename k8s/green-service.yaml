# Service to expose Green (v2) pods individually for NGINX shadow routing
apiVersion: v1
kind: Service
metadata:
  name: django-green
  namespace: progressive-django
  labels:
    app: django
    version: green
spec:
  selector:
    app: django
    version: green
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP
