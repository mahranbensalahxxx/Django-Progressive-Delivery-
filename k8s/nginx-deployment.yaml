# Student 3: Shadow Traffic — NGINX Deployment
# Runs NGINX as a reverse proxy that mirrors traffic to the Green (v2) deployment.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-shadow
  namespace: progressive-django
  labels:
    app: nginx-shadow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-shadow
  template:
    metadata:
      labels:
        app: nginx-shadow
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-shadow-config
