# NGINX Docker Compose config (uses container names instead of K8s DNS)
events {
    worker_connections 1024;
}

http {
    upstream blue {
        server django-blue:8000;
    }

    upstream green {
        server django-green:8000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://blue;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            mirror /mirror-to-shadow;
            mirror_request_body on;
        }

        location = /mirror-to-shadow {
            internal;
            proxy_pass http://green$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Shadow-Traffic "true";
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
